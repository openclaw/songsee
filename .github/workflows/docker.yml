name: docker

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build image
        run: docker build --pull -t songsee:ci .

      - name: Smoke test image
        run: |
          set -euo pipefail
          docker run --rm songsee:ci --version
          docker run --rm songsee:ci --help
          docker run --rm --entrypoint ffmpeg songsee:ci -version
